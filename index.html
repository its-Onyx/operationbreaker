<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Launcher | V2.0.2</title>

  <style>
    button {
      margin-bottom: 10px;
    }
  </style>

</head>
<body>
  <h1>Choose a page to open:</h1>

  <button onclick="openPage('https://akazimc.github.io/operationbreaker/TuffClient-WASM')">
    WASM-GC TuffClient [RECOMMENDED]
  </button>
  <button onclick="openPage('https://akazimc.github.io/operationbreaker/TuffClient-JS')">
    JS TuffClient
  </button>

  <button onclick="openPage('https://akazimc.github.io/operationbreaker/Eaglercraft')">
    WASM-GC Eaglercraft
  </button>
  <button onclick="openPage('https://akazimc.github.io/operationbreaker/Eaglercraft-JS')">
    JS Eaglercraft
  </button>

  <script>
    function openPage(url) {
      let win = window.open("about:blank", "_blank");

      // Setup the new tab
      let doc = win.document;
      doc.open();
      doc.write(`
        <title>Savvas Realize</title>
        <link rel="icon" type="image/png" href="/favicon.png">
        <style>
          body { margin:0; height:100%; overflow:hidden; }
          iframe { border:none; width:100%; height:100%; }
        </style>
        <iframe src="${url}"></iframe>
      `);
      doc.close();
    }
  </script>
</body>
</html>
