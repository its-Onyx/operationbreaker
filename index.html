<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />

<title>Client Launcher / V3.2.0</title>

<style>
:root {
  --bg: #0f0f14;
  --card: rgba(23, 23, 36, 0.95);
  --primary: #b58cff;
  --primary-hover: #c9a8ff;
  --text: #ffffff;
  --text-soft: #e6e6f0;
  --muted: #a0a0c0;
}

/* ---------- BASE ---------- */

* {
  box-sizing: border-box;
  font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Ubuntu, sans-serif;
}

body {
  margin: 0;
  min-height: 100vh;
  background-color: var(--bg);
  background-image: 
    radial-gradient(circle at 50% 0%, #2a2a40, transparent 70%),
    radial-gradient(circle at 80% 80%, rgba(181, 140, 255, 0.08), transparent 40%);
  overflow: hidden; /* Main page doesn't scroll, the card does */
  color: var(--text);
}

.page-center {
  height: 100vh;
  width: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}

/* ---------- CARD + GLOW ---------- */

.glow {
  position: absolute;
  width: 600px;
  height: 600px;
  background: radial-gradient(circle, rgba(181, 140, 255, 0.25), transparent 65%);
  filter: blur(80px);
  pointer-events: none;
  z-index: 0;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
}

.container {
  position: relative;
  z-index: 10;
  background: var(--card);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  padding: 24px;
  border-radius: 20px;
  width: 100%;
  max-width: 440px;
  /* SCROLLING FIXES */
  max-height: 90vh;
  overflow-y: auto;
  box-shadow: 
    0 24px 48px -12px rgba(0, 0, 0, 0.6),
    inset 0 0 0 1px rgba(255, 255, 255, 0.08);
  animation: enter 0.5s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
}

/* Custom Scrollbar */
.container::-webkit-scrollbar {
  width: 8px;
}
.container::-webkit-scrollbar-track {
  background: transparent;
}
.container::-webkit-scrollbar-thumb {
  background-color: rgba(181, 140, 255, 0.2);
  border-radius: 20px;
  border: 2px solid var(--bg); /* Creates padding effect */
}
.container::-webkit-scrollbar-thumb:hover {
  background-color: rgba(181, 140, 255, 0.4);
}

@keyframes enter {
  from { opacity: 0; transform: translateY(20px) scale(0.96); }
  to { opacity: 1; transform: none; }
}

h1 {
  margin: 0 0 20px;
  font-size: 1.5rem;
  text-align: center;
  background: linear-gradient(to right, #fff, var(--primary));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  font-weight: 700;
}

/* ---------- SECTIONS ---------- */

.section { margin-bottom: 20px; }

.section-title {
  font-size: 0.75rem;
  letter-spacing: 0.1em;
  color: var(--muted);
  margin-bottom: 12px;
  text-transform: uppercase;
  font-weight: 600;
  display: flex;
  align-items: center;
  gap: 8px;
}

.section-divider {
  height: 1px;
  background: linear-gradient(to right, transparent, rgba(255,255,255,0.1), transparent);
  margin: 20px 0;
}

/* ---------- BUTTONS ---------- */

button {
  position: relative;
  width: 100%;
  padding: 14px 16px;
  margin-bottom: 10px;
  border-radius: 14px;
  border: none;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 12px;
  text-align: left;
  background: linear-gradient(135deg, var(--primary), #8f6bff);
  transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
  box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
}

/* Icon */
button svg {
  width: 20px;
  height: 20px;
  flex-shrink: 0;
  transition: transform 0.2s ease;
  fill: currentColor;
  color: #fff;
}

/* Text */
.button-text {
  flex: 1;
}
.button-title {
  font-size: 0.95rem;
  font-weight: 600;
  color: #fff;
  line-height: 1.2;
}
.button-desc {
  font-size: 0.75rem;
  color: rgba(255,255,255,0.85);
  margin-top: 2px;
}

/* Hover effects */
button:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 20px -4px rgba(181, 140, 255, 0.4);
}
button:hover svg { transform: scale(1.1); }
button:active { transform: scale(0.98); }

/* ---------- BADGE ---------- */

.badge {
  position: absolute;
  top: 10px;
  right: 12px;
  font-size: 0.6rem;
  font-weight: 800;
  letter-spacing: 0.05em;
  padding: 4px 8px;
  border-radius: 20px;
  background: rgba(0,0,0,0.25);
  color: #fff;
  backdrop-filter: blur(4px);
}

/* ---------- SECONDARY STYLE ---------- */

button.secondary {
  background: rgba(255, 255, 255, 0.03);
  border: 1px solid rgba(255, 255, 255, 0.08);
  box-shadow: none;
}
button.secondary .button-title { color: var(--text-soft); }
button.secondary .button-desc { color: var(--muted); }

button.secondary:hover {
  background: rgba(181, 140, 255, 0.1);
  border-color: rgba(181, 140, 255, 0.3);
  box-shadow: 0 8px 24px -6px rgba(0, 0, 0, 0.3);
}

/* ---------- VERSION TOGGLE ---------- */

.version-toggle {
  display: flex;
  background: rgba(0,0,0,0.2);
  padding: 4px;
  border-radius: 14px;
}

.version-btn {
  flex: 1;
  padding: 8px;
  border-radius: 10px;
  border: none;
  background: transparent;
  color: var(--muted);
  font-weight: 600;
  cursor: pointer;
  transition: 0.2s ease;
  margin-bottom: 0; /* Override button generic style */
  box-shadow: none; /* Override button generic style */
  justify-content: center;
}

.version-btn:hover { 
  background: rgba(255,255,255,0.05); 
  transform: none; 
}

.version-btn.active {
  background: var(--card);
  color: var(--primary);
  box-shadow: 0 2px 8px rgba(0,0,0,0.2);
}

button.hidden { display: none !important; }

/* ---------- FOOTER ---------- */

footer {
  margin-top: 24px;
  font-size: 0.7rem;
  color: var(--muted);
  text-align: center;
  opacity: 0.6;
}

/* ------------ Ko-Fi Button ---------- */

.kofi-btn {
  position: fixed;
  bottom: 20px;
  left: 20px;
  z-index: 100;
  opacity: 0.8;
  transition: opacity 0.2s;
}
.kofi-btn:hover { opacity: 1; }
.kofi-btn img { height: 32px; border: 0; display: block;}

</style>

  <script>
    // ---------- CONFIGURATION ----------
    // Change these to disguise the tab when a game opens
    const CLOAK_CONFIG = {
      title: "Savvas Realize",
      icon: "https://akazimc.github.io/operationbreaker/favicon.png"
    };

    // ---------- FUNCTIONS ----------

    function filterVersion(version, btn) {
      // 1. Reset all buttons to inactive
      document.querySelectorAll(".version-btn").forEach(b => {
        b.classList.remove("active");
        // Fix: Ensure we don't accidentally remove specific styling if added later
      });
      
      // 2. Set clicked button to active
      btn.classList.add("active");

      // 3. Show/Hide entries
      const entries = document.querySelectorAll("button[data-version]");
      entries.forEach(entry => {
        if (entry.dataset.version === version) {
          entry.classList.remove("hidden");
          // Add a small animation reset
          entry.style.animation = 'none';
          entry.offsetHeight; /* trigger reflow */
          entry.style.animation = 'enter 0.3s ease forwards';
        } else {
          entry.classList.add("hidden");
        }
      });
    }

    function openPage(url) {
      const win = window.open("about:blank", "_blank");
      
      if (!win) {
        alert("Pop-up blocked! Please allow pop-ups for this launcher.");
        return;
      }

      // We write the HTML into the new window
      const htmlContent = `
        <!DOCTYPE html>
        <html lang="en">
        <head>
          <meta charset="UTF-8">
          <meta name="viewport" content="width=device-width, initial-scale=1.0">
          <title>Loading...</title>
          <link rel="icon" type="image/png" href="${CLOAK_CONFIG.icon}">
          <style>
            body { margin:0; height:100vh; background:#000; overflow:hidden; display:flex; justify-content:center; align-items:center; }
            iframe { width:100%; height:100%; border:none; }
            /* Simple loading spinner */
            .loader { width: 40px; height: 40px; border: 3px solid rgba(255,255,255,0.1); border-top-color: #b58cff; border-radius: 50%; animation: spin 0.8s linear infinite; position: absolute; z-index: -1; }
            @keyframes spin { to { transform: rotate(360deg); } }
          </style>
        </head>
        <body>
          <div class="loader"></div>
          <iframe id="clientFrame" src="${url}" allowfullscreen="true"></iframe>
          <script>
            const frame = document.getElementById('clientFrame');
            frame.onload = function() {
              document.title = "${CLOAK_CONFIG.title}";
            };
          <\/script>
        </body>
        </html>
      `;

      win.document.write(htmlContent);
      win.document.close();
    }

    // Initialize Default View
    window.addEventListener("DOMContentLoaded", () => {
      // Find the first active button or default to 1.12.2
      const defaultBtn = document.querySelector(".version-btn.active") 
                      || document.querySelector(".version-btn");
      if(defaultBtn) {
        filterVersion('1.12.2', defaultBtn);
      }
    });
  </script>
